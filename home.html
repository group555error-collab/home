<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
<title>RSU Link — Home</title>
<link rel="stylesheet" href="shared.css"/>
<style>
/* ── Feed ────────────────────────────────────────────── */
.feed-scroll {
  flex: 1;
  overflow-y: auto;
  padding-bottom: calc(var(--bottom-nav-h) + 20px);
}
.feed-scroll::-webkit-scrollbar { display: none; }

/* ── Stories bar ─────────────────────────────────────── */
.stories-bar {
  display: flex;
  gap: 12px;
  padding: 14px 16px;
  overflow-x: auto;
  border-bottom: 1px solid var(--outline);
}
.stories-bar::-webkit-scrollbar { display: none; }
.story-item {
  display: flex; flex-direction: column; align-items: center;
  gap: 5px; flex-shrink: 0; cursor: pointer;
}
.story-ring {
  width: 58px; height: 58px; border-radius: 50%;
  background: linear-gradient(135deg, var(--primary) 0%, #a56bff 100%);
  padding: 2.5px; transition: transform 0.18s;
}
.story-ring:active { transform: scale(0.9); }
.story-inner {
  width: 100%; height: 100%; border-radius: 50%;
  background: var(--surface-mid);
  display: flex; align-items: center; justify-content: center;
  font-size: 22px;
}
.story-ring.add-story {
  background: var(--surface-high);
  border: 2px dashed rgba(110,64,201,0.5);
  padding: 0;
}
.story-label {
  font-size: 10px; color: var(--on-surface-muted);
  white-space: nowrap; max-width: 58px;
  overflow: hidden; text-overflow: ellipsis; text-align: center;
}

/* ── Compose bar ─────────────────────────────────────── */
.compose-bar {
  display: flex; align-items: center; gap: 12px;
  padding: 12px 16px;
  border-bottom: 1px solid var(--outline);
  cursor: pointer;
}
.compose-input-fake {
  flex: 1; background: var(--surface-mid);
  border: 1.5px solid var(--outline);
  border-radius: var(--radius-full);
  padding: 10px 16px;
  color: var(--on-surface-muted);
  font-size: 14px;
  pointer-events: none;
  user-select: none;
}
.compose-actions {
  display: flex; gap: 4px;
  padding: 8px 16px;
  border-bottom: 6px solid var(--surface-low);
}
.compose-action-btn {
  flex: 1; display: flex; align-items: center;
  justify-content: center; gap: 6px;
  background: none; border: none;
  color: var(--on-surface-muted);
  font-size: 12px; font-weight: 600;
  padding: 8px 4px; border-radius: var(--radius-sm);
  cursor: pointer; font-family: inherit;
  transition: background 0.15s, color 0.15s;
}
.compose-action-btn:hover { background: rgba(255,255,255,0.05); color: var(--on-surface); }
.compose-action-btn .material-symbols-outlined { font-size: 18px; }

/* ── Post card ───────────────────────────────────────── */
.post-card {
  background: var(--surface);
  border-bottom: 6px solid var(--surface-low);
  animation: fadeIn 0.25s ease;
}
@keyframes fadeIn { from{opacity:0;transform:translateY(6px)} to{opacity:1;transform:none} }

.post-header {
  display: flex; align-items: center; gap: 10px;
  padding: 14px 16px 10px;
}
.post-avatar {
  width: 42px; height: 42px; border-radius: 50%;
  background: var(--surface-high);
  display: flex; align-items: center; justify-content: center;
  font-size: 20px; flex-shrink: 0;
}
.post-meta-name {
  font-weight: 700; font-size: 14px;
}
.faculty-badge {
  font-size: 10px; background: rgba(110,64,201,0.25);
  color: var(--primary-light); padding: 2px 8px;
  border-radius: 99px; font-weight: 700;
}
.post-body {
  padding: 0 16px 12px;
  font-size: 14.5px; line-height: 1.7;
  white-space: pre-wrap; word-break: break-word;
}
.edited-label {
  font-size: 11px; color: var(--on-surface-muted);
  font-style: italic; margin-left: 4px;
}

/* ── Reaction bar ────────────────────────────────────── */
.reaction-summary {
  padding: 6px 16px;
  display: flex; align-items: center;
  justify-content: space-between;
  font-size: 12px; color: var(--on-surface-muted);
  border-top: 1px solid var(--outline);
  border-bottom: 1px solid var(--outline);
  cursor: pointer;
}
.reaction-actions { display: flex; }
.react-btn {
  flex: 1; display: flex; align-items: center;
  justify-content: center; gap: 6px;
  padding: 10px 4px; background: none; border: none;
  color: var(--on-surface-muted); font-size: 13px; font-weight: 600;
  cursor: pointer; font-family: inherit;
  border-radius: var(--radius-sm);
  transition: background 0.15s, color 0.15s;
}
.react-btn:hover { background: rgba(255,255,255,0.04); color: var(--on-surface); }
.react-btn.liked { color: #e03e3e; }
.react-btn.liked .material-symbols-outlined { font-variation-settings: 'FILL' 1; }
.react-btn .material-symbols-outlined { font-size: 18px; }

/* ── Post menu ───────────────────────────────────────── */
.post-menu-wrap { position: relative; }
.post-menu-dropdown {
  position: absolute; top: 36px; right: 0;
  background: var(--surface-high);
  border: 1px solid var(--outline);
  border-radius: var(--radius-md);
  min-width: 160px; z-index: 100;
  box-shadow: 0 8px 32px rgba(0,0,0,0.5);
  overflow: hidden; display: none;
}
.post-menu-dropdown.open { display: block; }
.post-menu-item {
  display: flex; align-items: center; gap: 10px;
  padding: 12px 16px; font-size: 13px; font-weight: 600;
  cursor: pointer; transition: background 0.12s;
  color: var(--on-surface); background: none; border: none;
  width: 100%; font-family: inherit; text-align: left;
}
.post-menu-item:hover { background: rgba(255,255,255,0.06); }
.post-menu-item.danger { color: var(--error); }
.post-menu-item .material-symbols-outlined { font-size: 17px; }

/* ── Inline Edit ─────────────────────────────────────── */
.edit-area {
  margin: 0 16px 12px;
  background: var(--surface-mid);
  border: 1.5px solid var(--primary);
  border-radius: var(--radius-md);
  padding: 10px 14px;
  font-size: 14.5px; line-height: 1.7;
  color: var(--on-surface);
  font-family: inherit;
  resize: none; width: calc(100% - 32px);
  min-height: 80px;
  outline: none;
}
.edit-row {
  display: flex; gap: 8px;
  padding: 0 16px 14px;
  justify-content: flex-end;
}

/* ── Comments section ────────────────────────────────── */
.comments-section {
  background: var(--surface-mid);
  border-top: 1px solid var(--outline);
  display: none;
}
.comments-section.open { display: block; }
.comment-item {
  display: flex; gap: 10px;
  padding: 10px 16px;
  border-bottom: 1px solid var(--outline);
  animation: fadeIn 0.2s ease;
}
.comment-avatar {
  width: 32px; height: 32px; border-radius: 50%;
  background: var(--surface-high);
  display: flex; align-items: center; justify-content: center;
  font-size: 15px; flex-shrink: 0;
}
.comment-bubble {
  background: var(--surface-high);
  border-radius: 0 var(--radius-md) var(--radius-md) var(--radius-md);
  padding: 8px 12px; flex: 1; position: relative;
}
.comment-name { font-size: 12px; font-weight: 700; margin-bottom: 3px; }
.comment-text { font-size: 13px; line-height: 1.55; white-space: pre-wrap; word-break: break-word; }
.comment-time { font-size: 10px; color: var(--on-surface-muted); margin-top: 4px; }
.comment-delete {
  background: none; border: none; color: var(--on-surface-muted);
  font-size: 11px; cursor: pointer; padding: 2px 4px;
  border-radius: 4px; transition: color 0.1s;
  position: absolute; top: 6px; right: 8px;
}
.comment-delete:hover { color: var(--error); }
.comment-input-row {
  display: flex; gap: 8px; padding: 10px 16px; align-items: center;
}
.comment-input {
  flex: 1; background: var(--surface-high);
  border: 1.5px solid var(--outline);
  border-radius: var(--radius-full);
  padding: 9px 14px; font-size: 13px; color: var(--on-surface);
  font-family: inherit; outline: none;
  transition: border-color 0.2s;
}
.comment-input:focus { border-color: var(--primary); }
.comment-submit {
  background: var(--primary); border: none;
  width: 36px; height: 36px; border-radius: 50%;
  color: white; cursor: pointer; flex-shrink: 0;
  display: flex; align-items: center; justify-content: center;
  transition: opacity 0.2s, transform 0.1s;
}
.comment-submit:hover { opacity: 0.85; }
.comment-submit:active { transform: scale(0.9); }
.comment-submit .material-symbols-outlined { font-size: 18px; }

/* ── Empty state ─────────────────────────────────────── */
.empty-feed {
  padding: 60px 20px; text-align: center; opacity: 0.4;
}
.empty-feed .material-symbols-outlined { font-size: 48px; display: block; margin-bottom: 10px; }

/* ── Skeleton loader ─────────────────────────────────── */
.skeleton-card {
  background: var(--surface); border-bottom: 6px solid var(--surface-low);
  padding: 14px 16px;
}
.skel {
  background: linear-gradient(90deg, var(--surface-high) 25%, var(--surface-mid) 50%, var(--surface-high) 75%);
  background-size: 200% 100%;
  animation: shimmer 1.4s infinite;
  border-radius: 8px;
}
@keyframes shimmer { 0%{background-position:200% 0} 100%{background-position:-200% 0} }

/* ── Compose Modal ───────────────────────────────────── */
.compose-modal {
  position: fixed; inset: 0; z-index: 200;
  background: rgba(0,0,0,0.65);
  backdrop-filter: blur(4px);
  display: flex; align-items: flex-end;
  opacity: 0; pointer-events: none;
  transition: opacity 0.25s;
}
.compose-modal.open {
  opacity: 1; pointer-events: all;
}
.compose-sheet {
  width: 100%; max-width: 540px; margin: 0 auto;
  background: var(--surface-high);
  border-radius: var(--radius-lg) var(--radius-lg) 0 0;
  padding: 0 0 env(safe-area-inset-bottom);
  transform: translateY(40px);
  transition: transform 0.3s cubic-bezier(0.34,1.1,0.64,1);
}
.compose-modal.open .compose-sheet { transform: translateY(0); }
.compose-sheet-handle {
  width: 40px; height: 4px;
  background: rgba(255,255,255,0.15);
  border-radius: 99px;
  margin: 10px auto 0;
}
.compose-sheet-header {
  display: flex; align-items: center; gap: 12px;
  padding: 14px 16px 12px;
  border-bottom: 1px solid var(--outline);
}
.compose-textarea {
  width: 100%; min-height: 120px;
  background: transparent; border: none;
  padding: 14px 16px; font-size: 15px; line-height: 1.6;
  color: var(--on-surface); font-family: inherit;
  resize: none; outline: none;
}
.compose-textarea::placeholder { color: var(--on-surface-muted); }
.compose-footer {
  display: flex; align-items: center; justify-content: flex-end;
  padding: 10px 16px 14px;
  border-top: 1px solid var(--outline);
  gap: 10px;
}
.char-count {
  font-size: 12px; color: var(--on-surface-muted);
  flex: 1;
}
.char-count.warn { color: var(--warn); }
.char-count.error { color: var(--error); }

/* ── Compose type chips ──────────────────────────────── */
.compose-type-chip {
  background: var(--surface-mid); border: 1px solid var(--outline);
  border-radius: var(--radius-full); padding: 4px 10px;
  font-size: 11px; font-weight: 700; color: var(--on-surface-muted);
  cursor: pointer; font-family: inherit; white-space: nowrap;
  transition: all 0.15s;
}
.compose-type-chip.active {
  background: rgba(110,64,201,0.25); border-color: var(--primary);
  color: var(--primary-light);
}
/* wrap chips row */
.compose-sheet-header {
  flex-wrap: wrap;
  gap: 8px !important;
  padding-bottom: 12px !important;
}
/* ── Loading state on post button ────────────────────── */
@keyframes btnSpin {
  to { transform: rotate(360deg); }
}
.btn-loading .material-symbols-outlined {
  animation: btnSpin 0.7s linear infinite;
}
</style>
</head>

<script>
// ── Init ──────────────────────────────────────────────────
const user  = Auth.requireAuth();
const token = Auth.getToken();
const API   = (window.API_BASE || 'http://127.0.0.1:5000');

// Guard every DOM write — a missing element must never kill the whole script
function safeSet(id, prop, val) {
  try { const el = document.getElementById(id); if (el) el[prop] = val; } catch (_) {}
}
safeSet('my-story-emoji',       'textContent', user?.avatar || '🎓');
safeSet('compose-avatar',       'textContent', user?.avatar || '🎓');
safeSet('compose-modal-avatar', 'textContent', user?.avatar || '🎓');
safeSet('compose-modal-name',   'textContent', user?.name   || 'You');

try { renderTopBar('RSU <span style="color:var(--primary-light);font-weight:300;">Link</span>'); } catch(_){}
try { renderBottomNav('home'); } catch(_){}

// ── Posts state ──────────────────────────────────────────
let postsCache = [];

// ── Auth header helper ───────────────────────────────────
function authHdr() {
  return token ? { 'Authorization': 'Bearer ' + token } : {};
}

// ── Load Posts ───────────────────────────────────────────
function clearSkeletons() {
  try { document.getElementById('skel1')?.remove(); } catch(_){}
  try { document.getElementById('skel2')?.remove(); } catch(_){}
}

async function loadPosts() {
  // Safety net: clear skeletons after 6 s no matter what
  const skeletonTimer = setTimeout(() => {
    clearSkeletons();
    const feed = document.getElementById('posts-feed');
    if (feed && !feed.querySelector('.post-card') && !feed.querySelector('.empty-feed')) {
      feed.innerHTML = `
        <div class="empty-feed">
          <span class="material-symbols-outlined">wifi_off</span>
          <p style="font-size:13px;">Backend not responding.<br>Make sure <code>python backend.py</code> is running on port 5000.</p>
        </div>`;
    }
  }, 6000);

  try {
    const controller = new AbortController();
    const fetchTimer = setTimeout(() => controller.abort(), 8000);
    const res  = await fetch(API + '/api/posts', {
      headers: authHdr(),
      signal: controller.signal
    });
    clearTimeout(fetchTimer);
    clearTimeout(skeletonTimer);
    const data = await res.json();
    postsCache = data.posts || [];
    clearSkeletons();
    renderFeed(postsCache);
  } catch (e) {
    clearTimeout(skeletonTimer);
    clearSkeletons();
    const feed = document.getElementById('posts-feed');
    if (feed) {
      const isAbort = e.name === 'AbortError';
      feed.innerHTML = `
        <div class="empty-feed">
          <span class="material-symbols-outlined">wifi_off</span>
          <p style="font-size:13px;">${isAbort ? 'Request timed out.' : 'Could not connect to backend.'}<br>
          Make sure <code>python backend.py</code> is running.</p>
        </div>`;
    }
  }
}

function renderFeed(posts) {
  const feed = document.getElementById('posts-feed');
  if (!feed) return;
  if (!posts.length) {
    feed.innerHTML = `
      <div class="empty-feed">
        <span class="material-symbols-outlined">auto_awesome</span>
        <p style="font-size:13px;">No posts yet — be the first to share something!</p>
      </div>`;
    return;
  }
  try {
    feed.innerHTML = posts.map(p => {
      try { return renderPostCard(p); }
      catch(e) { console.warn('renderPostCard error:', e, p); return ''; }
    }).join('');
  } catch(e) {
    console.error('renderFeed error:', e);
    feed.innerHTML = `<div class="empty-feed"><p style="font-size:13px;color:var(--error);">Error rendering posts. Check console.</p></div>`;
  }
}

function renderPostCard(p) {
  const isOwner   = p.author_uid === user.uid;
  const faculty   = p.author_faculty || '';
  const year      = p.author_year   || '';
  const badge     = (faculty || year)
    ? `<span class="faculty-badge">${[faculty, year ? 'Year ' + year : ''].filter(Boolean).join(' · ')}</span>`
    : '';
  const editedTag = p.is_edited ? `<span class="edited-label">(edited)</span>` : '';
  const likeIcon  = p.user_liked
    ? `<span class="material-symbols-outlined" style="font-variation-settings:'FILL' 1">favorite</span>`
    : `<span class="material-symbols-outlined">favorite_border</span>`;
  const likeLabel = p.like_count > 0
    ? `❤️ ${p.like_count}`
    : `<span style="font-size:14px;opacity:0.5;">No reactions yet</span>`;
  const commentLabel = p.comment_count === 1
    ? '1 comment'
    : `${p.comment_count || 0} comments`;

  const ownerMenu = isOwner ? `
    <div class="post-menu-wrap">
      <button class="btn-ghost" style="padding:6px;" onclick="toggleMenu('menu-${p.id}', event)">
        <span class="material-symbols-outlined" style="font-size:18px;">more_horiz</span>
      </button>
      <div class="post-menu-dropdown" id="menu-${p.id}">
        <button class="post-menu-item" onclick="startEdit('${p.id}', event)">
          <span class="material-symbols-outlined">edit</span> Edit post
        </button>
        <button class="post-menu-item danger" onclick="deletePost('${p.id}')">
          <span class="material-symbols-outlined">delete</span> Delete post
        </button>
      </div>
    </div>` : `
    <div style="width:30px;"></div>`;

  return `
  <div class="post-card" id="post-${p.id}" data-post-id="${p.id}">
    <div class="post-header">
      <div class="post-avatar">${p.author_avatar || '🎓'}</div>
      <div style="flex:1;min-width:0;">
        <div style="display:flex;align-items:center;gap:6px;flex-wrap:wrap;">
          <span class="post-meta-name">${escHtml(p.author_name || 'Unknown')}</span>
          ${badge}
        </div>
        <p class="text-muted text-xs">${escHtml(p.time_ago || 'just now')} · 🌐 Everyone</p>
      </div>
      ${ownerMenu}
    </div>
    <div class="post-body" id="body-${p.id}">
      ${renderPostExtras(p)}
      ${escHtml(p.content)}${editedTag}
    </div>

    <!-- Inline edit form (hidden by default) -->
    <div id="edit-form-${p.id}" style="display:none;">
      <textarea class="edit-area" id="edit-input-${p.id}" rows="3">${escHtml(p.content)}</textarea>
      <div class="edit-row">
        <button class="btn-outline" style="padding:7px 16px;font-size:12px;" onclick="cancelEdit('${p.id}')">Cancel</button>
        <button class="btn-primary" style="padding:7px 16px;font-size:12px;" onclick="saveEdit('${p.id}')">Save</button>
      </div>
    </div>

    <!-- Reaction summary -->
    <div class="reaction-summary" onclick="toggleComments('${p.id}')">
      <span id="like-summary-${p.id}">${likeLabel}</span>
      <span id="cmt-count-${p.id}">${commentLabel}</span>
    </div>

    <!-- Action buttons -->
    <div class="reaction-actions">
      <button class="react-btn${p.user_liked ? ' liked' : ''}" id="like-btn-${p.id}" onclick="toggleLike('${p.id}')">
        ${likeIcon} Like
      </button>
      <button class="react-btn" onclick="toggleComments('${p.id}')">
        <span class="material-symbols-outlined">chat_bubble_outline</span> Comment
      </button>
      <button class="react-btn" onclick="sharePost('${p.id}')">
        <span class="material-symbols-outlined">share</span> Share
      </button>
    </div>

    <!-- Comments section -->
    <div class="comments-section" id="comments-${p.id}">
      <div id="comments-list-${p.id}"></div>
      <div class="comment-input-row">
        <div class="comment-avatar" style="flex-shrink:0;">${user.avatar || '🎓'}</div>
        <input class="comment-input" id="cmt-input-${p.id}"
          placeholder="Write a comment…"
          onkeydown="if(event.key==='Enter'&&!event.shiftKey){event.preventDefault();submitComment('${p.id}');}"/>
        <button class="comment-submit" onclick="submitComment('${p.id}')">
          <span class="material-symbols-outlined">send</span>
        </button>
      </div>
    </div>
  </div>`;
}

// ── Post type extras renderer ────────────────────────────
function renderPostExtras(p) {
  let extras = '';
  if (p.post_type === 'photo' && p.image_data) {
    extras += `<div style="margin:-0px -16px 10px;"><img src="${p.image_data}" alt="Post photo"
      style="width:auto;max-height:360px;object-fit:cover;display:block;"/></div>`;
  }
  if ((p.post_type === 'event' || p.post_type === 'checkin') && p.event_title) {
    const icon = p.post_type === 'checkin' ? '📍' : '📅';
    extras += `<div style="display:flex;align-items:center;gap:8px;background:rgba(110,64,201,0.12);
      border:1px solid rgba(110,64,201,0.3);border-radius:var(--radius-sm);padding:7px 10px;margin-bottom:8px;">
      <span style="font-size:16px;">${icon}</span>
      <span style="font-size:12px;font-weight:700;color:var(--primary-light);">
        ${p.post_type === 'checkin' ? 'Checked in at' : 'Tagged event:'} ${escHtml(p.event_title)}
      </span>
    </div>`;
  }
  if (p.post_type === 'announce' && p.announcement_title) {
    extras += `<div style="background:rgba(248,113,113,0.1);border-left:3px solid var(--error);
      padding:8px 12px;border-radius:0 var(--radius-sm) var(--radius-sm) 0;margin-bottom:8px;">
      <p style="font-size:13px;font-weight:800;color:#f87171;">📢 ${escHtml(p.announcement_title)}</p>
    </div>`;
  }
  return extras;
}

// ── Escape HTML ──────────────────────────────────────────
function escHtml(str) {
  return String(str || '')
    .replace(/&/g,'&amp;')
    .replace(/</g,'&lt;')
    .replace(/>/g,'&gt;')
    .replace(/"/g,'&quot;');
}

// ── Compose state ────────────────────────────────────────
let currentPostType   = 'text';
let selectedPhotoB64  = null;
let selectedEventId   = null;
let selectedEventTitle= null;

// ── Compose modal ─────────────────────────────────────────
function openCompose(type) {
  currentPostType  = type || 'text';
  selectedPhotoB64 = null;
  selectedEventId  = null;
  selectedEventTitle = null;
  document.getElementById('compose-modal').classList.add('open');
  setTimeout(() => {
    setPostType(currentPostType);
    document.getElementById('compose-text').focus();
  }, 300);
}

function setPostType(type) {
  currentPostType = type;
  // Update chip states
  ['text','photo','event','checkin','announce'].forEach(t => {
    document.getElementById('chip-' + t)?.classList.toggle('active', t === type);
  });
  // Show/hide extra areas
  document.getElementById('compose-photo-area').style.display    = type === 'photo'    ? '' : 'none';
  document.getElementById('compose-event-area').style.display    = (type === 'event' || type === 'checkin') ? '' : 'none';
  document.getElementById('compose-announce-area').style.display = type === 'announce' ? '' : 'none';

  // Update label
  const labels = { text:'🌐 Everyone at RSU', photo:'📷 Photo post', event:'📅 Event tag', checkin:'📍 Check-in', announce:'📢 Announcement' };
  document.getElementById('compose-modal-type-label').textContent = labels[type] || '🌐 Everyone at RSU';

  // Update placeholder
  const placeholders = {
    text:     'What\'s on your mind?',
    photo:    'Write a caption for your photo…',
    event:    'Say something about this event…',
    checkin:  'Add a personal note about your check-in…',
    announce: 'Write your announcement message…'
  };
  document.getElementById('compose-text').placeholder = placeholders[type] || 'Share something with RSU...';

  // Load events for event/checkin picker
  if (type === 'event' || type === 'checkin') loadEventPicker();
}

function loadEventPicker() {
  const list = document.getElementById('event-picker-list');
  const events = EventStore.getAll().slice(0, 20);
  if (!events.length) {
    list.innerHTML = '<p style="font-size:12px;color:var(--on-surface-muted);padding:8px;">No events available</p>';
    return;
  }
  list.innerHTML = events.map(ev => `
    <button onclick="selectEvent('${ev.id}','${(ev.title||'').replace(/'/g,"\'")}')"
            id="ev-pick-${ev.id}"
            style="display:flex;align-items:center;gap:8px;background:var(--surface-mid);border:1px solid var(--outline);
                   border-radius:var(--radius-sm);padding:8px 10px;cursor:pointer;font-family:inherit;
                   font-size:12px;font-weight:600;color:var(--on-surface);text-align:left;transition:all 0.15s;width:100%;">
      <span style="font-size:18px;flex-shrink:0;">${ev.emoji||'📅'}</span>
      <div style="flex:1;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;">
        ${ev.title}
        <span style="color:var(--on-surface-muted);font-weight:400;"> · ${ev.date||''}</span>
      </div>
    </button>`).join('');
}

function selectEvent(id, title) {
  selectedEventId    = id;
  selectedEventTitle = title;
  document.querySelectorAll('[id^="ev-pick-"]').forEach(b => {
    b.style.borderColor = b.id === 'ev-pick-' + id ? 'var(--primary)' : 'var(--outline)';
    b.style.background  = b.id === 'ev-pick-' + id ? 'rgba(110,64,201,0.18)' : 'var(--surface-mid)';
  });
}

function onPhotoSelected(input) {
  const file = input.files[0];
  if (!file) return;
  if (file.size > 5 * 1024 * 1024) { showToast('Max photo size is 5MB', 'error'); return; }
  const reader = new FileReader();
  reader.onload = e => {
    selectedPhotoB64 = e.target.result;
    document.getElementById('photo-placeholder').style.display = 'none';
    const prev = document.getElementById('photo-preview');
    prev.src   = selectedPhotoB64;
    prev.style.display = 'block';
    document.getElementById('photo-upload-label').style.borderColor = 'var(--success)';
  };
  reader.readAsDataURL(file);
}
function closeCompose() {
  document.getElementById('compose-modal').classList.remove('open');
  // Reset photo
  selectedPhotoB64 = null;
  document.getElementById('photo-placeholder').style.display = '';
  const prev = document.getElementById('photo-preview');
  if (prev) { prev.src=''; prev.style.display='none'; }
  document.getElementById('compose-photo-input').value = '';
  // Reset event
  selectedEventId = null; selectedEventTitle = null;
  // Reset announce
  const at = document.getElementById('announce-title-input');
  if (at) at.value = '';
}
function handleComposeBackdrop(e) {
  if (e.target === document.getElementById('compose-modal')) closeCompose();
}
function onComposeInput() {
  const txt = document.getElementById('compose-text').value;
  const cc  = document.getElementById('char-count');
  cc.textContent = `${txt.length} / 2000`;
  cc.className = txt.length > 1900 ? 'char-count error'
               : txt.length > 1600 ? 'char-count warn'
               : 'char-count';
}

async function submitPost() {
  const text = (document.getElementById('compose-text').value || '').trim();
  if (!text) { showToast('Write something first!', 'error'); return; }

  const btn  = document.getElementById('post-btn');
  const icon = document.getElementById('post-btn-icon');
  btn.disabled = true;
  btn.classList.add('btn-loading');
  icon.textContent = 'autorenew';

  try {
    // Build post payload based on type
    const payload = {
      content:  text,
      post_type: currentPostType,
    };
    if (currentPostType === 'photo' && selectedPhotoB64) {
      payload.image_data = selectedPhotoB64;
    }
    if ((currentPostType === 'event' || currentPostType === 'checkin') && selectedEventId) {
      payload.event_id    = selectedEventId;
      payload.event_title = selectedEventTitle;
    }
    if (currentPostType === 'checkin') {
      payload.checkin_note = text;
    }
    if (currentPostType === 'announce') {
      const titleInput = document.getElementById('announce-title-input');
      payload.announcement_title = titleInput ? titleInput.value.trim() : '';
    }

    const res  = await fetch(API + '/api/posts', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', ...authHdr() },
      body: JSON.stringify(payload)
    });
    const data = await res.json();
    if (!res.ok) throw new Error(data.error || 'Failed to post');

    // Prepend to feed
    postsCache.unshift(data.post);
    const feed    = document.getElementById('posts-feed');
    const emptyEl = feed.querySelector('.empty-feed');
    if (emptyEl) emptyEl.remove();
    feed.insertAdjacentHTML('afterbegin', renderPostCard(data.post));

    document.getElementById('compose-text').value = '';
    onComposeInput();
    closeCompose();
    showToast('Posted! 🎉', 'success');
  } catch (e) {
    showToast(e.message || 'Could not post. Is the backend running?', 'error');
  } finally {
    btn.disabled = false;
    btn.classList.remove('btn-loading');
    icon.textContent = 'send';
  }
}

// ── Post menu ─────────────────────────────────────────────
function toggleMenu(menuId, e) {
  e.stopPropagation();
  const menu = document.getElementById(menuId);
  const open = menu.classList.contains('open');
  document.querySelectorAll('.post-menu-dropdown.open').forEach(m => m.classList.remove('open'));
  if (!open) menu.classList.add('open');
}
document.addEventListener('click', () => {
  document.querySelectorAll('.post-menu-dropdown.open').forEach(m => m.classList.remove('open'));
});

// ── Edit post ─────────────────────────────────────────────
function startEdit(postId, e) {
  if (e) e.stopPropagation();
  document.querySelectorAll('.post-menu-dropdown.open').forEach(m => m.classList.remove('open'));
  document.getElementById('body-' + postId).style.display = 'none';
  document.getElementById('edit-form-' + postId).style.display = 'block';
  const inp = document.getElementById('edit-input-' + postId);
  inp.focus();
  inp.selectionStart = inp.selectionEnd = inp.value.length;
}
function cancelEdit(postId) {
  document.getElementById('body-' + postId).style.display = '';
  document.getElementById('edit-form-' + postId).style.display = 'none';
}
async function saveEdit(postId) {
  const inp     = document.getElementById('edit-input-' + postId);
  const content = (inp.value || '').trim();
  if (!content) { showToast('Post cannot be empty', 'error'); return; }

  try {
    const res  = await fetch(API + '/api/posts/' + postId, {
      method: 'PUT',
      headers: { 'Content-Type': 'application/json', ...authHdr() },
      body: JSON.stringify({ content })
    });
    const data = await res.json();
    if (!res.ok) throw new Error(data.error || 'Edit failed');

    // Update cache
    const idx = postsCache.findIndex(p => p.id === postId);
    if (idx >= 0) postsCache[idx] = data.post;

    // Update DOM
    const bodyEl = document.getElementById('body-' + postId);
    bodyEl.innerHTML = escHtml(data.post.content)
      + (data.post.is_edited ? '<span class="edited-label">(edited)</span>' : '');
    cancelEdit(postId);
    showToast('Post updated ✏️', 'success');
  } catch (e) {
    showToast(e.message || 'Could not update post', 'error');
  }
}

// ── Delete post ───────────────────────────────────────────
async function deletePost(postId) {
  if (!confirm('Delete this post? This cannot be undone.')) return;
  try {
    const res = await fetch(API + '/api/posts/' + postId, {
      method: 'DELETE',
      headers: authHdr()
    });
    if (!res.ok) {
      const d = await res.json();
      throw new Error(d.error || 'Delete failed');
    }
    postsCache = postsCache.filter(p => p.id !== postId);
    const el = document.getElementById('post-' + postId);
    if (el) {
      el.style.transition = 'opacity 0.25s, transform 0.25s';
      el.style.opacity = '0';
      el.style.transform = 'scaleY(0.5)';
      setTimeout(() => {
        el.remove();
        if (!postsCache.length) renderFeed([]);
      }, 260);
    }
    showToast('Post deleted', 'success');
  } catch (e) {
    showToast(e.message || 'Could not delete post', 'error');
  }
}

// ── Like / Unlike ─────────────────────────────────────────
async function toggleLike(postId) {
  const btn = document.getElementById('like-btn-' + postId);
  if (!btn) return;

  // Optimistic update
  const wasLiked = btn.classList.contains('liked');
  btn.classList.toggle('liked', !wasLiked);
  const iconEl = btn.querySelector('.material-symbols-outlined');
  iconEl.textContent = wasLiked ? 'favorite_border' : 'favorite';
  if (!wasLiked) iconEl.style.fontVariationSettings = "'FILL' 1";
  else           iconEl.style.fontVariationSettings = "'FILL' 0";

  try {
    const res  = await fetch(API + '/api/posts/' + postId + '/like', {
      method: 'POST',
      headers: authHdr()
    });
    const data = await res.json();
    if (!res.ok) throw new Error(data.error || 'Like failed');

    // Sync real count
    const summaryEl = document.getElementById('like-summary-' + postId);
    summaryEl.innerHTML = data.like_count > 0
      ? `❤️ ${data.like_count}`
      : `<span style="font-size:14px;opacity:0.5;">No reactions yet</span>`;

    // Update cache
    const idx = postsCache.findIndex(p => p.id === postId);
    if (idx >= 0) {
      postsCache[idx].user_liked  = data.liked;
      postsCache[idx].like_count  = data.like_count;
    }
  } catch (e) {
    // Revert optimistic
    btn.classList.toggle('liked', wasLiked);
    iconEl.textContent = wasLiked ? 'favorite' : 'favorite_border';
    showToast('Like failed — is backend running?', 'error');
  }
}

// ── Comments ──────────────────────────────────────────────
const commentsLoaded = {};

async function toggleComments(postId) {
  const section = document.getElementById('comments-' + postId);
  const isOpen  = section.classList.contains('open');
  if (!isOpen) {
    section.classList.add('open');
    if (!commentsLoaded[postId]) {
      await loadComments(postId);
      commentsLoaded[postId] = true;
    }
    // Focus input
    setTimeout(() => document.getElementById('cmt-input-' + postId)?.focus(), 100);
  } else {
    section.classList.remove('open');
  }
}

async function loadComments(postId) {
  const listEl = document.getElementById('comments-list-' + postId);
  listEl.innerHTML = `<div style="padding:12px 16px;color:var(--on-surface-muted);font-size:12px;">Loading…</div>`;
  try {
    const res  = await fetch(API + '/api/posts/' + postId + '/comments', { headers: authHdr() });
    const data = await res.json();
    renderComments(postId, data.comments || []);
  } catch {
    listEl.innerHTML = `<div style="padding:12px 16px;color:var(--error);font-size:12px;">Failed to load comments</div>`;
  }
}

function renderComments(postId, comments) {
  const listEl   = document.getElementById('comments-list-' + postId);
  const countEl  = document.getElementById('cmt-count-' + postId);
  if (countEl) countEl.textContent = comments.length === 1 ? '1 comment' : `${comments.length} comments`;

  if (!comments.length) {
    listEl.innerHTML = `<div style="padding:12px 16px;color:var(--on-surface-muted);font-size:12px;">No comments yet. Be first!</div>`;
    return;
  }
  listEl.innerHTML = comments.map(c => renderComment(postId, c)).join('');
}

function renderComment(postId, c) {
  const canDelete = c.author_uid === user.uid || user.role === 'admin';
  const deleteBtn = canDelete
    ? `<button class="comment-delete" onclick="deleteComment('${postId}','${c.id}')" title="Delete">✕</button>`
    : '';
  return `
    <div class="comment-item" id="comment-${c.id}">
      <div class="comment-avatar">${c.author_avatar || '🎓'}</div>
      <div class="comment-bubble">
        ${deleteBtn}
        <div class="comment-name">${escHtml(c.author_name || 'Unknown')}</div>
        <div class="comment-text">${escHtml(c.content)}</div>
        <div class="comment-time">${escHtml(c.time_ago || 'just now')}</div>
      </div>
    </div>`;
}

async function submitComment(postId) {
  const inp     = document.getElementById('cmt-input-' + postId);
  const content = (inp.value || '').trim();
  if (!content) return;

  inp.disabled = true;
  try {
    const res  = await fetch(API + '/api/posts/' + postId + '/comments', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', ...authHdr() },
      body: JSON.stringify({ content })
    });
    const data = await res.json();
    if (!res.ok) throw new Error(data.error || 'Comment failed');

    inp.value = '';
    commentsLoaded[postId] = true;

    // Append new comment
    const listEl = document.getElementById('comments-list-' + postId);
    const wasEmpty = listEl.querySelector('div') && !listEl.querySelector('.comment-item');
    if (wasEmpty) listEl.innerHTML = '';
    listEl.insertAdjacentHTML('beforeend', renderComment(postId, data.comment));

    // Update count in cache + DOM
    const idx = postsCache.findIndex(p => p.id === postId);
    if (idx >= 0) postsCache[idx].comment_count = (postsCache[idx].comment_count || 0) + 1;
    const countEl = document.getElementById('cmt-count-' + postId);
    if (countEl) {
      const n = postsCache[idx]?.comment_count || 1;
      countEl.textContent = n === 1 ? '1 comment' : `${n} comments`;
    }
  } catch (e) {
    showToast(e.message || 'Could not post comment', 'error');
  } finally {
    inp.disabled = false;
    inp.focus();
  }
}

async function deleteComment(postId, commentId) {
  if (!confirm('Delete this comment?')) return;
  try {
    const res = await fetch(API + '/api/posts/' + postId + '/comments/' + commentId, {
      method: 'DELETE',
      headers: authHdr()
    });
    if (!res.ok) {
      const d = await res.json();
      throw new Error(d.error || 'Delete failed');
    }
    const el = document.getElementById('comment-' + commentId);
    if (el) {
      el.style.opacity = '0';
      el.style.transition = 'opacity 0.2s';
      setTimeout(() => el.remove(), 220);
    }
    // Update count
    const idx = postsCache.findIndex(p => p.id === postId);
    if (idx >= 0) postsCache[idx].comment_count = Math.max(0, (postsCache[idx].comment_count || 1) - 1);
    const countEl = document.getElementById('cmt-count-' + postId);
    if (countEl) {
      const n = postsCache[idx]?.comment_count || 0;
      countEl.textContent = n === 1 ? '1 comment' : `${n} comments`;
    }
    showToast('Comment deleted');
  } catch (e) {
    showToast(e.message || 'Could not delete comment', 'error');
  }
}

// ── Share ─────────────────────────────────────────────────
function sharePost(postId) {
  const post = postsCache.find(p => p.id === postId);
  const text = post ? `${post.author_name}: ${post.content.slice(0, 100)}` : 'Check this post on RSU Link!';
  if (navigator.share) {
    navigator.share({ title: 'RSU Link', text }).catch(() => {});
  } else {
    navigator.clipboard?.writeText(text);
    showToast('Post copied to clipboard!');
  }
}

// ── Boot ──────────────────────────────────────────────────
loadPosts();

// Poll every 30s for new posts (lightweight social feel)
setInterval(() => {
  fetch(API + '/api/posts', { headers: authHdr() })
    .then(r => r.json())
    .then(data => {
      if (!data.posts) return;
      const newPosts = data.posts.filter(p => !postsCache.find(c => c.id === p.id));
      if (newPosts.length) {
        postsCache = data.posts;
        const feed = document.getElementById('posts-feed');
        newPosts.forEach(p => {
          if (!document.getElementById('post-' + p.id)) {
            feed.insertAdjacentHTML('afterbegin', renderPostCard(p));
          }
        });
      }
    })
    .catch(() => {});
}, 30000);
</script>
